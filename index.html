
<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregador • Filtros & Bots</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }
        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }
        .filter-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .filter-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .game-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .game-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }
        .highlight { border-color: #eab308; background-color: #451a03; }
        .section-header { font-size: 1.1rem; font-weight: 600; color: #f3e8ff; margin-bottom: 0.75rem; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">

    <!-- Header -->
    <div class="border-b border-slate-800 bg-slate-900">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center">
                    <i class="fa-solid fa-robot text-white text-2xl"></i>
                </div>
                <div>
                    <h1 class="font-display text-3xl font-semibold tracking-tighter">Agregador</h1>
                    <p class="text-emerald-400 text-xs -mt-1">Filtros &amp; Bots • v1.1</p>
                </div>
            </div>
            <button onclick="showConfigModal()" class="flex items-center gap-x-2 px-4 py-2 text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-3xl">
                <i class="fa-solid fa-cog"></i> <span class="hidden md:inline">Config</span>
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="max-w-7xl mx-auto px-6 pt-6">
        <div class="flex border-b border-slate-800 overflow-x-auto">
            <button onclick="switchTab('filtros')" id="tab-filtros" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 tab-active">
                <i class="fa-solid fa-list-check w-4"></i><span>Meus Filtros</span>
            </button>
            <button onclick="switchTab('criar')" id="tab-criar" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">
                <i class="fa-solid fa-plus w-4"></i><span>Criar Filtro</span>
            </button>
            <button onclick="switchTab('importar')" id="tab-importar" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">
                <i class="fa-solid fa-download w-4"></i><span>Importar</span>
            </button>
            <button onclick="switchTab('jogos')" id="tab-jogos" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">
                <i class="fa-solid fa-futbol w-4"></i><span>Jogos ao Vivo</span>
            </button>
            <button onclick="switchTab('alertas')" id="tab-alertas" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">
                <i class="fa-solid fa-bell w-4"></i><span>Alertas</span>
            </button>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-6">
        <!-- MEUS FILTROS -->
        <div id="content-filtros">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-2xl font-semibold">Meus Filtros</h2>
                    <p class="text-slate-400 text-sm">Filtros simples + compostos</p>
                </div>
                <div class="flex gap-x-2">
                    <button onclick="abrirModalFiltroComposto()" class="flex items-center gap-x-2 px-4 py-2.5 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium rounded-3xl">
                        <i class="fa-solid fa-link mr-2"></i> <span>Criar Filtro Composto</span>
                    </button>
                    <button onclick="switchTab('criar')" class="flex items-center gap-x-2 px-5 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium rounded-3xl">
                        <i class="fa-solid fa-plus mr-2"></i> <span>Novo Filtro</span>
                    </button>
                </div>
            </div>
            <div id="filtros-lista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- CRIAR FILTRO -->
        <div id="content-criar" class="hidden">
            <div class="max-w-3xl">
                <h2 class="text-2xl font-semibold mb-4">Criar Novo Filtro</h2>
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
                    <p class="text-slate-400">Usa a importação ou cria filtros compostos por agora.</p>
                </div>
            </div>
        </div>

        <!-- IMPORTAR -->
        <div id="content-importar" class="hidden">
            <div class="max-w-2xl">
                <h2 class="text-2xl font-semibold mb-2">Importar Filtro</h2>
                <textarea id="import-text" rows="8" placeholder="Cole o JSON aqui..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-sm font-mono"></textarea>
                <button onclick="importarFiltro()" class="mt-3 w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold">Importar</button>
            </div>
        </div>

        <!-- JOGOS AO VIVO -->
        <div id="content-jogos" class="hidden">
            <div class="flex items-center justify-between mb-4">
                <div>
                    <h2 class="text-2xl font-semibold">Jogos ao Vivo</h2>
                    <p class="text-slate-400 text-sm">Todos os jogos encontrados • Destaque automático</p>
                </div>
                <button onclick="atualizarJogosAoVivo(true)" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-3xl text-sm">
                    <i class="fa-solid fa-sync-alt mr-2"></i> Atualizar agora
                </button>
            </div>
            <div id="jogos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </div>

        <!-- ALERTAS -->
        <div id="content-alertas" class="hidden">
            <div class="max-w-3xl">
                <h2 class="text-2xl font-semibold mb-2">Alertas</h2>
                <p class="text-slate-400">Exporta filtros para o Activepieces.</p>
            </div>
        </div>
    </div>

    <script>
        let filtros = [];
        let jogosAoVivo = [];

        function init() {
            carregarFiltros();
            renderFiltros();
            switchTab('filtros');
        }

        function carregarFiltros() {
            const saved = localStorage.getItem('agregador_filtros');
            if (saved) filtros = JSON.parse(saved);
        }

        function guardarFiltros() {
            localStorage.setItem('agregador_filtros', JSON.stringify(filtros));
        }

        function renderFiltros() {
            const container = document.getElementById('filtros-lista');
            container.innerHTML = '';
            filtros.forEach((f, i) => {
                const card = document.createElement('div');
                card.className = `filter-card bg-slate-900 border border-slate-700 rounded-3xl p-5`;
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <div class="font-semibold">${f.nome}</div>
                            <div class="text-sm text-slate-400">${f.mercado || ''}</div>
                        </div>
                        <button onclick="eliminarFiltro(${i})" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                    </div>
                    <div class="mt-4 grid grid-cols-3 gap-2">
                        <button onclick="exportarParaRobobet(${i})" class="text-xs py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">RoboBet</button>
                        <button onclick="exportarParaAlertas(${i})" class="text-xs py-2 bg-purple-600 hover:bg-purple-700 text-white rounded-2xl">Alertas</button>
                        <button onclick="exportarComoJSON(${i})" class="text-xs py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl">JSON</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function eliminarFiltro(i) {
            if (confirm('Eliminar?')) {
                filtros.splice(i, 1);
                guardarFiltros();
                renderFiltros();
            }
        }

        function exportarParaAlertas(i) {
            const f = filtros[i];
            const data = {nome: f.nome, tipo: f.tipo, mercado: f.mercado, condicoes: f.condicoes || []};
            navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => alert('JSON copiado para alertas!'));
        }

        function exportarParaRobobet(i) {
            alert('Copiado para RoboBet (formato básico)');
        }

        function exportarComoJSON(i) {
            navigator.clipboard.writeText(JSON.stringify(filtros[i], null, 2)).then(() => alert('JSON copiado!'));
        }

        // Chave grátis em https://dashboard.api-football.com (~100 pedidos/dia).
        // Guardada só neste browser via localStorage - configura em "Config".
        const API_FOOTBALL_URL = 'https://v3.football.api-sports.io/fixtures?live=all';

        async function atualizarJogosAoVivo() {
            const container = document.getElementById('jogos-container');
            const apiKey = localStorage.getItem('apifootball_key');

            if (!apiKey) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-10 text-slate-400">
                        <i class="fa-solid fa-key text-2xl mb-3 block"></i>
                        Ainda não configuraste a tua chave da API-Football.
                        <div class="mt-4">
                            <button onclick="showConfigModal()" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 rounded-3xl text-sm text-white font-medium">Configurar chave</button>
                        </div>
                    </div>`;
                return;
            }

            container.innerHTML = '<div class="col-span-full text-center py-8"><i class="fa-solid fa-spinner fa-spin mr-2"></i>A carregar todos os jogos ao vivo...</div>';

            try {
                const res = await fetch(API_FOOTBALL_URL, {
                    headers: { 'x-apisports-key': apiKey }
                });

                if (!res.ok) throw new Error('HTTP ' + res.status + ' - verifica a chave ou o limite diário');

                const data = await res.json();

                if (data.errors && Object.keys(data.errors).length > 0) {
                    throw new Error(Object.values(data.errors).join(' | '));
                }

                jogosAoVivo = (data.response || []).map(f => ({
                    id: f.fixture.id,
                    casa: f.teams.home.name,
                    fora: f.teams.away.name,
                    golosCasa: f.goals.home ?? 0,
                    golosFora: f.goals.away ?? 0,
                    minuto: f.fixture.status.elapsed ? f.fixture.status.elapsed + "'" : f.fixture.status.short,
                    competicao: f.league.name,
                    fonte: 'API-Football'
                }));

                renderJogosAoVivo();
            } catch (err) {
                console.error('Erro a atualizar jogos ao vivo:', err);
                container.innerHTML = `
                    <div class="col-span-full text-center py-10 text-red-400">
                        <i class="fa-solid fa-triangle-exclamation text-2xl mb-3 block"></i>
                        Erro ao ligar à API-Football: ${err.message}
                        <div class="text-slate-400 text-sm mt-2">Verifica a chave em Config, ou se atingiste o limite diário (100 pedidos/dia no plano grátis).</div>
                    </div>`;
            }
        }

        function renderJogosAoVivo() {
            const container = document.getElementById('jogos-container');
            container.innerHTML = '';

            if (jogosAoVivo.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400">Sem jogos ao vivo neste momento.</div>';
                return;
            }

            jogosAoVivo.forEach(j => {
                const card = document.createElement('div');
                card.className = `game-card bg-slate-900 border border-slate-700 rounded-3xl p-5`;
                card.innerHTML = `
                    <div class="flex justify-between">
                        <div>
                            <div class="text-xs text-slate-500 mb-1">${j.competicao}</div>
                            <div class="font-semibold">${j.casa} vs ${j.fora}</div>
                            <div class="text-emerald-400 text-xl">${j.golosCasa} - ${j.golosFora} <span class="text-xs">${j.minuto}</span></div>
                        </div>
                    </div>
                    <button onclick="adicionarJogoParaAlertas(${j.id})" class="mt-4 w-full py-2 bg-purple-600 hover:bg-purple-700 rounded-2xl text-sm">Adicionar a Alertas</button>
                `;
                container.appendChild(card);
            });
        }

        function showConfigModal() {
            const key = localStorage.getItem('apifootball_key') || '';
            const modal = document.createElement('div');
            modal.id = 'config-modal';
            modal.className = 'fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4';
            modal.innerHTML = `
                <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6 max-w-md w-full">
                    <h3 class="text-lg font-semibold mb-2">Configuração</h3>
                    <p class="text-slate-400 text-sm mb-4">Cola aqui a tua chave grátis da API-Football (<a href="https://dashboard.api-football.com" target="_blank" class="text-emerald-400 underline">dashboard.api-football.com</a>). Fica guardada só neste browser.</p>
                    <input id="config-api-key" type="text" value="${key}" placeholder="Chave da API-Football"
                        class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm font-mono mb-4">
                    <div class="flex gap-x-2">
                        <button onclick="guardarConfig()" class="flex-1 py-2.5 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold text-sm">Guardar</button>
                        <button onclick="fecharConfigModal()" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 rounded-3xl text-sm">Cancelar</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
        }

        function fecharConfigModal() {
            const modal = document.getElementById('config-modal');
            if (modal) modal.remove();
        }

        function guardarConfig() {
            const key = document.getElementById('config-api-key').value.trim();
            localStorage.setItem('apifootball_key', key);
            fecharConfigModal();
            atualizarJogosAoVivo();
        }

        function adicionarJogoParaAlertas(id) {
            alert('Jogo adicionado para alertas!');
        }

        function switchTab(tab) {
            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + tab).classList.remove('hidden');
            if (tab === 'filtros') renderFiltros();
            if (tab === 'jogos') atualizarJogosAoVivo();
        }

        window.onload = init;
    </script>
</body>
</html>
