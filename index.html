<!DOCTYPE html><html lang="pt"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Agregador • Filtros & Bots</title>    <script src="https://cdn.tailwindcss.com"></script>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">    <style>        body { font-family: 'Inter', system_ui, sans-serif; }        .font-display { font-family: 'Space Grotesk', 'Inter', sans-serif; font-weight: 600; }        .tab-active { border-bottom: 3px solid #10b981; color: #10b981; font-weight: 600; }        .filter-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }        .filter-card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }        .game-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }        .game-card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1); }    </style></head><body class="bg-slate-950 text-slate-200">
    <div class="border-b border-slate-800 bg-slate-900">        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">            <div class="flex items-center gap-x-3">                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center">                    <i class="fa-solid fa-robot text-white text-2xl"></i>                </div>                <div>                    <h1 class="font-display text-3xl font-semibold tracking-tighter">Agregador</h1>                    <p class="text-emerald-400 text-xs -mt-1">Filtros &amp; Bots • v1.2</p>                </div>            </div>            <button onclick="showConfigModal()" class="flex items-center gap-x-2 px-4 py-2 text-sm bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-3xl">                <i class="fa-solid fa-cog"></i> <span class="hidden md:inline">Config</span>            </button>        </div>    </div>
    <div class="max-w-7xl mx-auto px-6 pt-6">        <div class="flex border-b border-slate-800 overflow-x-auto">            <button onclick="switchTab('filtros')" id="tab-filtros" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 tab-active">                <i class="fa-solid fa-list-check w-4"></i><span>Meus Filtros</span>            </button>            <button onclick="switchTab('criar')" id="tab-criar" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">                <i class="fa-solid fa-plus w-4"></i><span>Criar Filtro</span>            </button>            <button onclick="switchTab('importar')" id="tab-importar" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">                <i class="fa-solid fa-download w-4"></i><span>Importar</span>            </button>            <button onclick="switchTab('jogos')" id="tab-jogos" class="nav-tab px-6 py-3 text-sm font-medium border-b-2 border-transparent flex items-center gap-x-2 text-slate-400">                <i class="fa-solid fa-futbol w-4"></i><span>Jogos ao Vivo</span>            </button>        </div>    </div>
    <div class="max-w-7xl mx-auto px-6 py-6">        <div id="content-filtros">            <div class="flex items-center justify-between mb-4">                <div>                    <h2 class="text-2xl font-semibold">Meus Filtros</h2>                    <p class="text-slate-400 text-sm">Lista de estratégias ativas</p>                </div>                <button onclick="switchTab('criar')" class="flex items-center gap-x-2 px-5 py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white text-sm font-medium rounded-3xl">                    <i class="fa-solid fa-plus mr-2"></i> <span>Novo Filtro</span>                </button>            </div>            <div id="filtros-lista" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>        </div>
        <div id="content-criar" class="hidden">            <div class="max-w-3xl mx-auto bg-slate-900 border border-slate-700 rounded-3xl p-6">                <h2 class="text-2xl font-semibold mb-6 flex items-center gap-x-2">                    <i class="fa-solid fa-sliders text-emerald-400"></i> Construtor de Filtro Resiliente                </h2>                                <div class="space-y-4">                    <div>                        <label class="block text-sm font-medium mb-1 text-slate-300">Nome do Filtro</label>                        <input id="f-nome" type="text" placeholder="Ex: Over 0.5 HT Resiliente" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm text-slate-100 focus:outline-none focus:border-emerald-500">                    </div>                                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">                        <div>                            <label class="block text-sm font-medium mb-1 text-slate-300">Mercado Alvo</label>                            <select id="f-mercado" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm text-slate-100 focus:outline-none focus:border-emerald-500">                                <option value="Golos">Golos (Over/Under)</option>                                <option value="Cantos">Cantos (Corners)</option>                                <option value="Match Odds">Resultado Final (1X2)</option>                            </select>                        </div>                        <div>                            <label class="block text-sm font-medium mb-1 text-slate-300">Omitir Fontes na UI?</label>                            <select id="f-omitir" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm text-slate-100 focus:outline-none focus:border-emerald-500">                                <option value="nao">Não (Mostrar marcas reais)</option>                                <option value="sim">Sim (Mascarar fontes originais)</option>                            </select>                        </div>                    </div>
                    <div class="border-t border-slate-800 pt-4 mt-4">                        <h3 class="text-sm font-semibold text-emerald-400 mb-3 flex items-center gap-x-2">                            <i class="fa-solid fa-shield-halved"></i> Hierarquia de Resiliência de Dados                        </h3>                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">                            <div>                                <label class="block text-xs font-medium mb-1 text-slate-400">1ª Opção (Prioridade Máxima)</label>                                <select id="f-fonte1" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm text-slate-100">                                    <option value="SokkerPRO">SokkerPRO</option>                                    <option value="RoboBet">RoboBet</option>                                    <option value="ESPN">ESPN Soccer</option>                                </select>                            </div>                            <div>                                <label class="block text-xs font-medium mb-1 text-slate-400">2ª Opção (Se a primeira falhar)</label>                                <select id="f-fonte2" class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-3 text-sm text-slate-100">                                    <option value="Bet365/RoboBet">Bet365 via RoboBet</option>                                    <option value="SokkerPRO">SokkerPRO</option>                                    <option value="ESPN">ESPN Soccer</option>                                </select>                            </div>                        </div>                    </div>
                    <button onclick="criarNovoFiltro()" class="w-full mt-6 py-3 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold text-sm text-white transition">                        Guardar e Ativar Filtro                    </button>                </div>            </div>        </div>
        <div id="content-importar" class="hidden">            <div class="max-w-2xl mx-auto">                <h2 class="text-2xl font-semibold mb-2">Importar Filtro</h2>                <textarea id="import-text" rows="8" placeholder="Cole o JSON aqui..." class="w-full bg-slate-800 border border-slate-700 rounded-2xl p-4 text-sm font-mono focus:outline-none focus:border-emerald-500"></textarea>                <button onclick="importarFiltro()" class="mt-3 w-full py-3 bg-emerald-500 hover:bg-emerald-600 rounded-3xl font-semibold">Importar</button>            </div>        </div>
        <div id="content-jogos" class="hidden">            <div class="flex items-center justify-between mb-4">                <div>                    <h2 class="text-2xl font-semibold">Jogos ao Vivo</h2>                    <p class="text-slate-400 text-sm">Dados agregados em tempo real</p>                </div>                <div class="flex items-center gap-x-3">                    <span id="robobet-ext-status" class="text-xs text-slate-500">⚪ Extensão RoboBet não detetada</span>                    <button onclick="atualizarJogosAoVivo()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 border border-slate-700 rounded-3xl text-sm">                        <i class="fa-solid fa-sync-alt mr-2"></i> Atualizar agora                    </button>                </div>            </div>            <div id="jogos-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>        </div>    </div>
    <script>        let filtros = [];        let jogosLiveScore = [];        let jogosRoboBet = [];        let jogosCarregados = false;
        function init() {            carregarFiltros();            renderFiltros();            lerCacheRoboBet();            switchTab('filtros');        }
        function carregarFiltros() {            const saved = localStorage.getItem('agregador_filtros');            if (saved) {                filtros = JSON.parse(saved);            } else {                // Filtro exemplo inicial                filtros = [{                    nome: "Estratégia Prémio Golos",                    mercado: "Golos",                    omitir: "nao",                    fonte1: "SokkerPRO",                    fonte2: "Bet365/RoboBet"                }];                guardarFiltros();            }        }
        function guardarFiltros() {            localStorage.setItem('agregador_filtros', JSON.stringify(filtros));        }
        function criarNovoFiltro() {            const nome = document.getElementById('f-nome').value.trim();            const mercado = document.getElementById('f-mercado').value;            const omitir = document.getElementById('f-omitir').value;            const fonte1 = document.getElementById('f-fonte1').value;            const fonte2 = document.getElementById('f-fonte2').value;
            if (!nome) {                alert('Por favor, dê um nome ao seu filtro.');                return;            }
            filtros.push({ nome, mercado, omitir, fonte1, fonte2 });            guardarFiltros();            renderFiltros();            switchTab('filtros');                        // Limpar formulário            document.getElementById('f-nome').value = '';        }
        function renderFiltros() {            const container = document.getElementById('filtros-lista');            container.innerHTML = '';            filtros.forEach((f, i) => {                const displayFonte1 = f.omitir === 'sim' ? 'Fonte Alfa' : f.fonte1;                const displayFonte2 = f.omitir === 'sim' ? 'Fonte Beta' : f.fonte2;
                const card = document.createElement('div');                card.className = `filter-card bg-slate-900 border ${f.omitir === 'sim' ? 'border-purple-900/50' : 'border-slate-700'} rounded-3xl p-5`;                card.innerHTML = `                    <div class="flex justify-between items-start">                        <div>                            <div class="font-semibold text-lg text-slate-100">${f.nome}</div>                            <div class="text-xs font-medium text-emerald-400 mt-0.5 bg-emerald-500/10 px-2 py-0.5 rounded-full inline-block">${f.mercado}</div>                        </div>                        <button onclick="eliminarFiltro(${i})" class="text-slate-500 hover:text-red-400 transition"><i class="fa-solid fa-trash"></i></button>                    </div>                    <div class="mt-4 space-y-1 text-xs text-slate-400 bg-slate-950 p-3 rounded-2xl border border-slate-800">                        <div class="flex justify-between"><span>Prio 1:</span> <span class="font-mono text-slate-200">${displayFonte1}</span></div>                        <div class="flex justify-between"><span>Fallback:</span> <span class="font-mono text-slate-300">${displayFonte2}</span></div>                    </div>                    <div class="mt-4 grid grid-cols-2 gap-2">                        <button onclick="exportarComoJSON(${i})" class="text-xs py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl transition text-center">Copiar JSON</button>                        <span class="text-center text-xs text-emerald-400 py-2 border border-emerald-500/20 bg-emerald-500/5 rounded-2xl">Ativo</span>                    </div>                `;                container.appendChild(card);            });        }
        function eliminarFiltro(i) {            if (confirm('Deseja eliminar este filtro?')) {                filtros.splice(i, 1);                guardarFiltros();                renderFiltros();            }        }
        function exportarComoJSON(i) {            navigator.clipboard.writeText(JSON.stringify(filtros[i], null, 2)).then(() => alert('Configuração do filtro copiada!'));        }
        function importarFiltro() {            const txt = document.getElementById('import-text').value.trim();            try {                const obj = JSON.parse(txt);                if(!obj.nome || !obj.mercado) throw new Error('Formato inválido');                filtros.push(obj);                guardarFiltros();                renderFiltros();                document.getElementById('import-text').value = '';                switchTab('filtros');            } catch(e) {                alert('Erro ao importar JSON. Verifique a estrutura.');            }        }
        function lerCacheRoboBet() {            const raw = localStorage.getItem('robobet_inplay_cache');            if (!raw) return;            try {                const cache = JSON.parse(raw);                const resposta = cache.data || {};                jogosRoboBet = (resposta.events || []).map(e => ({                    id: 'rb-' + e.id,                    casa: e.home,                    fora: e.away,                    golosCasa: e.scoreHome,                    golosFora: e.scoreAway,                    minuto: e.time || (e.minute ? e.minute + "'" : ''),                    competicao: (e.league && e.league.name) || '',                    fonte: 'RoboBet',                    ts: cache.ts                }));                jogosCarregados = true;                renderJogosAoVivo();            } catch (err) {                console.error(err);            }        }
        window.addEventListener('robobet-dados-atualizados', lerCacheRoboBet);
        function renderJogosAoVivo() {            const container = document.getElementById('jogos-container');            container.innerHTML = '';            const todos = [...jogosRoboBet]; 
            if (todos.length === 0) {                container.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400">Aguardando dados da extensão...</div>';                return;            }
            todos.forEach(j => {                const card = document.createElement('div');                card.className = `game-card bg-slate-900 border border-slate-700 rounded-3xl p-5`;                card.innerHTML = `                    <div class="flex justify-between items-start">                        <div>                            <div class="text-xs text-slate-500 mb-1">${j.competicao}</div>                            <div class="font-semibold">${j.casa} vs ${j.fora}</div>                            <div class="text-emerald-400 text-xl">${j.golosCasa} - ${j.golosFora} <span class="text-xs">${j.minuto}</span></div>                        </div>                    </div>                `;                container.appendChild(card);            });        }
        function switchTab(tab) {            document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));            document.getElementById('content-' + tab).classList.remove('hidden');            document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('tab-active', 'text-emerald-400'));            document.getElementById('tab-' + tab).classList.add('tab-active');        }
        function showConfigModal() {            alert('Configurações salvas localmente no browser.');        }
        window.onload = init;    </script></body></html>
